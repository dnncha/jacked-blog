name: jacked-coach
region: ams
domains:
  - domain: jacked.coach
    type: PRIMARY
    zone: jacked.coach
    minimum_tls_version: "1.2"
  - domain: www.jacked.coach
    type: ALIAS
    zone: jacked.coach
    minimum_tls_version: "1.2"
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
ingress:
  rules:
    - component:
        name: site
      match:
        path:
          prefix: /
static_sites:
  - name: site
    environment_slug: html
    git:
      repo_clone_url: https://github.com/dnncha/jacked-blog.git
      branch: gh-pages
    source_dir: /
    output_dir: /
    index_document: index.html
    error_document: 404.html
